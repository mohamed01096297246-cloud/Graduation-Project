<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduLink | لوحة تحكم المعلم (اختبار)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .btn { transition: all 0.3s ease; padding: 0.6rem 1.2rem; border-radius: 0.5rem; font-weight: bold; font-size: 0.875rem; text-align: center; cursor: pointer; border: none; }
        .btn-teal { background-color: #0d9488; color: white; }
        .btn-teal:hover { background-color: #0f766e; }
        .btn-indigo { background-color: #4f46e5; color: white; }
        .btn-indigo:hover { background-color: #4338ca; }
        .btn-rose { background-color: #e11d48; color: white; }
        .btn-rose:hover { background-color: #be123c; }
        .btn-dark { background-color: #334155; color: white; border: 1px solid #475569; }
        .btn-dark:hover { background-color: #475569; }
        .card { background-color: #1e293b; padding: 1.5rem; border-radius: 0.75rem; border: 1px solid #334155; margin-bottom: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        .input-field { width: 100%; background-color: #020617; border: 1px solid #334155; padding: 0.75rem; border-radius: 0.5rem; color: #f8fafc; margin-bottom: 1rem; font-size: 0.875rem; outline: none; }
        .input-field:focus { border-color: #0d9488; box-shadow: 0 0 0 2px rgba(13, 148, 136, 0.5); }
        pre { direction: ltr; background-color: #000; padding: 1rem; border-radius: 0.5rem; color: #34d399; font-size: 0.8rem; margin-top: 1rem; border: 1px solid #334155; max-height: 300px; overflow-y: auto; }
        .status-badge { padding: 0.3rem 0.8rem; border-radius: 0.5rem; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-teal-400">EduLink <span class="text-white">Teacher Portal</span></h1>
                <p class="text-slate-400 text-sm mt-1">واجهة اختبار صلاحيات المعلم (الغياب، الواجبات، رصد الدرجات)</p>
            </div>
            <div id="authStatus">
                <span class="status-badge bg-red-900 text-red-200">غير متصل</span>
            </div>
        </header>

        <div class="card" style="border-top: 4px solid #0d9488;">
            <h2 class="text-xl font-bold mb-4 text-teal-400">1. تسجيل دخول المعلم</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input id="login_user" type="text" class="input-field mb-0" placeholder="اسم المستخدم للمدرس">
                <input id="login_pass" type="password" class="input-field mb-0" placeholder="كلمة السر للمدرس">
                <button onclick="testLogin()" class="btn btn-teal">دخول للنظام</button>
            </div>
            <pre id="res_login">النتيجة ستظهر هنا...</pre>
        </div>

        <hr class="border-slate-700 my-8">

        <div class="card" style="border-top: 4px solid #4f46e5;">
            <h2 class="text-xl font-bold mb-4 text-indigo-400">2. لوحة المتابعة (Dashboard)</h2>
            <button onclick="apiCall('/teachers/dashboard', 'GET', null, 'res_dash')" class="btn btn-indigo">📊 جلب بيانات الداشبورد الخاصة بي</button>
            <pre id="res_dash">...</pre>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
            
            <div class="card" style="border-top: 4px solid #e11d48;">
                <h2 class="text-lg font-bold mb-4 text-rose-400">3. تسجيل غياب طالب</h2>
                <input id="att_student" type="text" placeholder="ID الطالب" class="input-field">
                <input id="att_class" type="text" placeholder="ID الفصل" class="input-field">
                <select id="att_status" class="input-field">
                    <option value="present">حاضر (Present)</option>
                    <option value="absent">غائب (Absent)</option>
                    <option value="late">متأخر (Late)</option>
                </select>
                <button onclick="testAttendance()" class="btn btn-rose w-full">حفظ حالة الحضور</button>
                <pre id="res_att">...</pre>
            </div>

            <div class="card" style="border-top: 4px solid #e11d48;">
                <h2 class="text-lg font-bold mb-4 text-rose-400">4. نشر واجب منزلي</h2>
                <input id="hw_title" type="text" placeholder="عنوان الواجب" class="input-field" value="حل تدريبات الوحدة الأولى">
                <input id="hw_class" type="text" placeholder="ID الفصل" class="input-field">
                <input id="hw_date" type="date" class="input-field">
                <button onclick="testHomework()" class="btn btn-rose w-full">إرسال الواجب للطلاب</button>
                <pre id="res_hw">...</pre>
            </div>

            <div class="card" style="border-top: 4px solid #e11d48;">
                <h2 class="text-lg font-bold mb-4 text-rose-400">5. رصد درجة امتحان</h2>
                <input id="res_exam_id" type="text" placeholder="ID الامتحان" class="input-field">
                <input id="res_student_id" type="text" placeholder="ID الطالب" class="input-field">
                <input id="res_marks" type="number" placeholder="درجة الطالب (مثال: 45)" class="input-field" value="45">
                <button onclick="testResult()" class="btn btn-rose w-full">حفظ الدرجة</button>
                <pre id="res_result">...</pre>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000/api";
        // فصلنا توكن المعلم عن توكن الأدمن عشان ميتعارضوش
        let TOKEN = localStorage.getItem("teacher_token") || "";

        function updateUI() {
            const status = document.getElementById("authStatus");
            if(TOKEN) {
                status.innerHTML = `<span class="status-badge" style="background-color: #064e3b; color: #34d399;">المعلم متصل ✓</span>`;
            } else {
                status.innerHTML = `<span class="status-badge" style="background-color: #7f1d1d; color: #fca5a5;">غير متصل</span>`;
            }
        }
        updateUI();

        async function apiCall(endpoint, method, body, resId) {
            const resArea = document.getElementById(resId);
            if(!TOKEN && endpoint !== '/auth/login') { 
                resArea.innerText = "⚠️ يجب تسجيل الدخول كمعلم أولاً!"; 
                return; 
            }

            resArea.innerText = "جاري التحميل...";

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method,
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: body ? JSON.stringify(body) : null
                });
                const data = await response.json();
                resArea.innerText = JSON.stringify(data, null, 2);
                return data;
            } catch (err) {
                resArea.innerText = "خطأ في الاتصال: " + err.message;
            }
        }

        async function testLogin() {
            const username = document.getElementById("login_user").value;
            const password = document.getElementById("login_pass").value;
            const data = await apiCall('/auth/login', 'POST', { username, password }, 'res_login');
            if(data && data.token) {
                TOKEN = data.token;
                localStorage.setItem("teacher_token", TOKEN);
                updateUI();
            }
        }

        function testAttendance() {
            apiCall("/attendance", "POST", { 
                student: document.getElementById("att_student").value,
                classroom: document.getElementById("att_class").value,
                date: new Date().toISOString(),
                status: document.getElementById("att_status").value
            }, "res_att");
        }

        function testHomework() {
            apiCall("/homework", "POST", { 
                title: document.getElementById("hw_title").value,
                description: "الرجاء حل الأسئلة وتسليمها في الموعد المحدد.",
                classroom: document.getElementById("hw_class").value,
                dueDate: document.getElementById("hw_date").value || new Date(Date.now() + 86400000).toISOString()
            }, "res_hw");
        }

        function testResult() {
            apiCall("/results", "POST", { 
                exam: document.getElementById("res_exam_id").value,
                student: document.getElementById("res_student_id").value,
                obtainedMarks: document.getElementById("res_marks").value,
                comments: "أداء ممتاز، استمر على هذا المستوى!"
            }, "res_result");
        }
    </script>
</body>
</html>
